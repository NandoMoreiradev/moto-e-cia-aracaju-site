services:
  # Backend API
  - type: web
    name: moto-e-cia-api
    runtime: node
    buildCommand: npm install && npm run db:generate && npm run build --filter=@moto-e-cia/api
    startCommand: node apps/api/dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: moto-e-cia-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000

  # Frontend Web
  - type: web
    name: moto-e-cia-web
    runtime: node
    buildCommand: npm install && npm run build --filter=@moto-e-cia/web
    startCommand: npm run start --filter=@moto-e-cia/web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: moto-e-cia-api
          property: host

databases:
  - name: moto-e-cia-db
    databaseName: moto_e_cia
    plan: free # Note: Render free tier expires after 90 days.
